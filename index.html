<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulaire État Civil</title>
    <link rel="stylesheet" href="style.css" />
  </head>
<a href="formstockage.html">formualire avec stockage js</a>

<a href="famille.html">formualire avec stockage js</a>
  <body>
    <div class="container">
      <h1>Formulaire d'État Civil</h1>

      <form action="traitement.php" method="post">
        <div class="form-group">
          <label for="nom">Nom :</label>
          <input type="text" id="nom" name="nom" required />
        </div>

        <div class="form-group">
          <label for="prenom">Prénom :</label>
          <input type="text" id="prenom" name="prenom" required />
        </div>

        <div class="form-group">
          <label for="date_naissance">Date de naissance :</label>
          <input
            type="date"
            id="date_naissance"
            name="date_naissance"
            required
          />
        </div>

        <div class="form-group">
          <label for="lieu_naissance">Lieu de naissance :</label>
          <input
            type="text"
            id="lieu_naissance"
            name="lieu_naissance"
            required
          />
        </div>

        <div class="form-group">
          <label>Sexe :</label>
          <div class="radio-group">
            <label
              ><input type="radio" name="sexe" value="M" required />
              Masculin</label
            >
            <label><input type="radio" name="sexe" value="F" /> Féminin</label>
          </div>
        </div>

        <div class="form-group">
          <label for="adresse">Adresse :</label>
          <textarea id="adresse" name="adresse" required></textarea>
        </div>

        <div class="form-group">
          <label for="telephone">Téléphone :</label>
          <input
            type="tel"
            id="telephone"
            name="telephone"
            pattern="[0-9]{10}"
          />
        </div>

        <div class="form-group">
          <label for="email">Email :</label>
          <input type="email" id="email" name="email" />
        </div>

        <button type="submit" class="btn">Enregistrer</button>
        <a href="liste.php" class="btn-list">Voir la liste</a>
      </form>
    </div>
  </body>
</html>
